name: Build Tauri Windows ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-arm64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install frontend deps
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Windows ARM64)
        run: |
          cargo tauri build --target aarch64-pc-windows-msvc

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-arm64
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
